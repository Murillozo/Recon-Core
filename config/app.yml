app:
  # Caminho raiz para dados e configs. Se vazio, usa a pasta do projeto.
  recon_root: ""

telegram:
  # Configure aqui o token do seu bot Telegram.
  # Exemplo: 123456789:AA...
  bot_token: ""

worker:
  poll_seconds: 15

paths:
  # Paths relativos ao recon_root para evitar problemas de permissão em /opt.
  sqlite: storage/history.sqlite
  scope: config/scope.txt
  tools: config/tools.yml
  profiles: config/profiles
